<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthSync AI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="ts-popup">
    <header class="popup-header">
      <div class="brand">
        <span class="logo-icon">⚡</span>
        <div>
          <h1>TruthSync <span class="accent">AI</span></h1>
          <p class="subtitle">Live Press & Event Verifier</p>
        </div>
      </div>
      <div class="version">v1.0.0</div>
    </header>

    <div class="card connection-card">
      <div class="status-indicator">
        <span id="ping-dot" class="dot pulsing-orange"></span>
        <span id="ping-text">백엔드 서버 확인 중...</span>
      </div>
      <div class="backend-url">http://localhost:8001</div>
    </div>

    <main class="instruction-panel">
      <h2>💡 사용 방법</h2>
      
      <div class="step-list">
        <div class="step-item">
          <span class="step-number">1</span>
          <p><strong>네이버 뉴스 기사</strong>에서 사실 확인이 필요한 발언 문장을 마우스로 드래그합니다.</p>
        </div>
        
        <div class="step-item">
          <span class="step-number">2</span>
          <p>드래그한 상태에서 마우스 우클릭 후 <strong>'TruthSync: 원본 영상 찾기'</strong>를 클릭합니다.</p>
        </div>
        
        <div class="step-item">
          <span class="step-number">3</span>
          <p>화면에 뜨는 <strong>후보지 선택 모달</strong>에서 발언 시점과 자막을 확인하고 유튜브로 이동합니다.</p>
        </div>
      </div>
    </main>

    <footer class="popup-footer">
      <p>Powered by TruthSync Engine</p>
    </footer>
  </div>
  <script src="popup.js"></script>
 </body>
</html>
